# DevSecOps pipeline — SAST (Semgrep) + SCA (Trivy) + Cosign sign
# Flow: scan source → build local → scan image → push (only if pass) → cosign sign (manual approve)

name: CI

on:
  push:
    branches: [main, dev, prod]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────
  # SAST — Semgrep
  # ─────────────────────────────────────────────
  semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    continue-on-error: true              # demo: vẫn fail finding nhưng không chặn pipeline
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        run: semgrep scan --config auto --sarif --output semgrep.sarif .  # bỏ --error để báo cáo finding nhưng exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-${{ github.run_id }}
          path: semgrep.sarif
          retention-days: 14

  # ─────────────────────────────────────────────
  # SCA — Trivy filesystem (dependencies)
  # ─────────────────────────────────────────────
  trivy-fs:
    name: SCA (Trivy FS)
    runs-on: ubuntu-latest
    continue-on-error: true              # demo: báo cáo finding nhưng không chặn pipeline
    steps:
      - uses: actions/checkout@v4
      - name: Trivy FS scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 0                   # 0 = không fail, vẫn in finding ra log
          severity: HIGH,CRITICAL
          ignore-unfixed: true

  # ─────────────────────────────────────────────
  # Build (local) + scan image — KHÔNG push
  # Image chỉ được upload qua artifact, không lên registry
  # ─────────────────────────────────────────────
  build-scan:
    name: Build & Scan Image
    runs-on: ubuntu-latest
    needs: [semgrep, trivy-fs]
    if: github.event_name == 'push'
    permissions:
      contents: read
      actions: write                  # cache: type=gha cần quyền này
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_ref: ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch

      - name: Build to tar (no push, no daemon load)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar  # export tar có sẵn tags

      - name: Trivy scan tar image
        continue-on-error: true          # demo: báo cáo finding nhưng không chặn pipeline
        uses: aquasecurity/trivy-action@master
        with:
          input: /tmp/image.tar
          format: table
          exit-code: 0                   # 0 = không fail, vẫn in finding
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-${{ github.run_id }}
          path: /tmp/image.tar
          retention-days: 1

  # ─────────────────────────────────────────────
  # Push image — chỉ chạy khi build-scan pass
  # ─────────────────────────────────────────────
  push:
    name: Push Image
    runs-on: ubuntu-latest
    needs: build-scan
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    outputs:
      image_digest: ${{ steps.push.outputs.digest }}
      image_ref: ${{ needs.build-scan.outputs.image_ref }}
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: image-${{ github.run_id }}
          path: /tmp

      - name: Load image into docker daemon
        run: docker load -i /tmp/image.tar

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        id: push
        run: |
          docker push ${{ needs.build-scan.outputs.image_ref }}
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ${{ needs.build-scan.outputs.image_ref }} | cut -d@ -f2)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────
  # Cosign sign — manual approve qua GitHub Environment
  # Setup 1 lần trên GitHub:
  #   Settings → Environments → New "production-sign"
  #     - Required reviewers: <Anh Quân>
  #     - Secrets: COSIGN_PRIVATE_KEY, COSIGN_PASSWORD
  # ─────────────────────────────────────────────
  cosign:
    name: Sign (Cosign)
    runs-on: ubuntu-latest
    needs: push
    if: github.event_name == 'push'
    environment: production-sign         # pause chờ approve
    permissions:
      contents: read
      packages: write
    steps:
      - uses: sigstore/cosign-installer@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign image
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          echo "${{ secrets.COSIGN_PRIVATE_KEY }}" > /tmp/cosign.key
          cosign sign --yes --key /tmp/cosign.key \
            -a "git-sha=${{ github.sha }}" \
            -a "branch=${{ github.ref_name }}" \
            -a "run-id=${{ github.run_id }}" \
            ${{ env.IMAGE }}@${{ needs.push.outputs.image_digest }}
          rm -f /tmp/cosign.key
